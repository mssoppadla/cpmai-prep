name: deploy

# Test → manual approval → SSH into VPS → run scripts/vps/deploy.sh
#
# Triggered by:
#   • push to main (after a merge / direct commit)
#   • workflow_dispatch (manual "Run workflow" button)
#
# The deploy job is gated by GitHub Environment "production":
#   • set up at https://github.com/<owner>/<repo>/settings/environments
#   • requires explicit approval from a configured reviewer
#   • restricts which branches can deploy (set to: main only)
#   • holds the SSH secrets (VPS_HOST, VPS_USER, VPS_SSH_KEY)
#
# See docs/ci-deploy-setup.md for one-time setup instructions.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one production deploy in flight at a time.
# cancel-in-progress=false → finish what's running, queue the rest.
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # Strict test gate. Unlike the per-PR CI workflows (which use `|| true` to
  # keep the dashboard green during scaffolding), this job MUST pass for the
  # deploy job to start.
  # ----------------------------------------------------------------------------
  test:
    name: Test gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        # Must match prod: prod docker-compose.yml uses pgvector/pgvector:pg16
        # so the `vector` extension is available + the VECTOR(N) column
        # type resolves. Plain postgres:16-alpine here fails on
        # Base.metadata.create_all() trying to render a vector column.
        # (Same vector data format as prod; just adds the extension.)
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cpmai
          POSTGRES_PASSWORD: cpmai_test
          POSTGRES_DB: cpmai_test
        options: >-
          --health-cmd "pg_isready -U cpmai -d cpmai_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
        ports: ["6379:6379"]
    env:
      # Test-only — never reuse these in production.
      DATABASE_URL: postgresql+psycopg2://cpmai:cpmai_test@localhost:5432/cpmai_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test_secret_key_not_used_in_prod
      APP_ENV: test
      # Pydantic-settings parses list[str] fields as JSON when sourced from
      # env. Provide them in JSON-array form, not comma-separated.
      ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
      CORS_ORIGINS: '["http://localhost:3000"]'
    steps:
      # ENCRYPTION_KEY is intentionally NOT in the env block above —
      # gitleaks flags any Fernet-shaped string baked into source as a
      # generic-api-key leak (correctly so, since real prod keys look
      # identical). Generate a fresh one per run; it's used only for
      # this job's pytest and discarded with the runner.
      #
      # Format matches Fernet's expectation: urlsafe base64 of 32 random
      # bytes. Uses Python stdlib (always present on Ubuntu runners) so
      # this step has no dependency on setup-python or pip installs.
      - name: Generate test ENCRYPTION_KEY (per-job, ephemeral)
        run: |
          python3 -c "import secrets, base64; print('ENCRYPTION_KEY=' + base64.urlsafe_b64encode(secrets.token_bytes(32)).decode())" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4

      # ---------- Backend ----------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend deps
        # requirements-dev.txt pulls in requirements.txt + pytest + fakeredis +
        # httpx + freezegun (everything conftest.py and the integration tests
        # need). Pinning via the file keeps CI consistent with local dev.
        run: pip install -r backend/requirements-dev.txt
      - name: Bootstrap schema + stamp alembic
        # Mirrors install_app.sh / deploy.sh on a fresh DB: 0001_baseline is
        # a no-op stamp, so we need Base.metadata.create_all() to build the
        # schema, then stamp alembic to head. Catches model-definition
        # breakage and ensures the test postgres looks like a freshly
        # installed prod.
        #
        # `CREATE EXTENSION vector` BEFORE create_all — required because
        # migration 0009 normally provides this, but CI bypasses
        # migrations and builds schema directly from model classes.
        # Without it, create_all blows up on the VECTOR(1536) column on
        # rag_chunks. Idempotent: safe on every CI run.
        #
        # NOTE on test-gate fidelity: CI executes Base.metadata.create_all
        # (model-derived schema), NOT alembic upgrade head (migration-
        # derived schema). When those two diverge — e.g. a migration
        # creates a Postgres enum with values that don't match the
        # SQLAlchemy Enum column's NAME-based default — prod can break
        # while CI passes. Hardening: a follow-up PR adds a second
        # job that runs `alembic upgrade head` from empty to validate
        # migration parity. Tracked separately.
        run: |
          cd backend
          python -c "
          import app.models  # noqa: F401  -- triggers SQLAlchemy registration
          from app.core.database import Base, engine
          from sqlalchemy import text
          with engine.begin() as c:
              c.execute(text('CREATE EXTENSION IF NOT EXISTS vector'))
          Base.metadata.create_all(bind=engine)
          print('schema created')
          "
          alembic stamp head
      - name: Backend tests (strict)
        run: cd backend && pytest -q

      # ---------- Frontend ----------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Frontend tests (strict — vitest)
        run: cd frontend && npm test
      - name: Frontend build (strict)
        env:
          # Build-time placeholders — real values are baked in on the VPS.
          # Build only fails on a code/type error, not on missing secrets.
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ""
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ""
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test_nextauth_secret_not_used_in_prod
        run: cd frontend && npm run build
      - name: Frontend lint (advisory)
        run: cd frontend && npm run lint || true

  # ----------------------------------------------------------------------------
  # Deploy gate — requires manual approval via the "production" Environment.
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to production VPS
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://cpmaiexamprep.com
    steps:
      - name: Configure SSH
        # Secrets:
        #   VPS_HOST       — hostname or IP (kept secret)
        #   VPS_USER       — usually "deploy"
        #   VPS_SSH_KEY    — private key content (ed25519 recommended)
        #   VPS_HOST_KEY   — output of `ssh-keyscan <host>` (host-key pinning)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${{ secrets.VPS_HOST_KEY }}" ]; then
            printf '%s\n' "${{ secrets.VPS_HOST_KEY }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy.sh on VPS
        # The deploy.sh script does: pre-deploy backup, alembic upgrade head,
        # idempotent seeder, restart containers, data-preservation guard,
        # 27-step smoke. If any of those fail, deploy.sh exits non-zero and
        # this step fails — the workflow surfaces it in the GitHub UI.
        run: |
          ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'set -e; cd /opt/cpmai-prep && ./scripts/vps/deploy.sh'

      - name: Post-deploy public smoke
        # External sanity check — hits the public hostname so we catch any
        # edge-side regression (TLS, Caddy routing) the on-VPS smoke missed.
        run: |
          curl -fsS https://api.cpmaiexamprep.com/health | grep -qi 'ok\|healthy'
          curl -fsS -o /dev/null -w "frontend %{http_code}\n" https://cpmaiexamprep.com
