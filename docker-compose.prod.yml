# Production override.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs dev:
#   • frontend is built (next build) instead of `next dev`
#   • backend uvicorn runs without --reload, no source mount
#   • postgres + redis NOT exposed to host — only reachable on the
#     internal docker network
#   • restart: always on every service
#   • prod env file used: backend/.env (same path) — values come
#     from the host's secret store, not from /app
services:
  postgres:
    restart: always
    ports: []                        # do not expose to host in prod
    volumes:
      # Keep init.sql; drop the host port mapping
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    restart: always
    ports: []                        # do not expose

  backend:
    restart: always
    volumes:
      # Persist log files on the host so backups and grep can reach them
      # without docker exec. Logs are JSONL — see backend/app/core/logging.py.
      - ./backend/logs:/app/logs
      # GeoIP database directory — bind-mounted so the monthly refresh
      # cron (running on the HOST, talking to MaxMind via the backend
      # container's CLI) writes to the same path the request handler
      # reads from. The directory is created by deploy.sh with uid 999
      # ownership to match the container's app user.
      # See: app/services/geoip/lookup.py:DEFAULT_DB_PATH and
      # scripts/vps/install_geoip.sh / geoip_refresh.sh.
      - /srv/cpmai/geoip:/srv/cpmai/geoip
      # Admin file uploads (CMS + LMS attachments). Re-declared here
      # because Compose's list-merge for service.volumes is short-syntax
      # ambiguous — we want to be SURE the named volume mounts in prod
      # rather than rely on merge semantics. Defined in the base
      # docker-compose.yml top-level `volumes:` block.
      - cpmai-uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # Bind to loopback only — Caddy proxies internally. Host port is
    # configurable via BACKEND_HOST_PORT (in .deploy.conf) for VPS
    # environments where the default 8000 collides with a host service.
    ports: ["127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # NEXT_PUBLIC_* values are baked into the bundle at build time.
      # Pulled from the host shell which has sourced frontend/.env.local
      # (install_app.sh / deploy.sh do this before `compose build`).
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_RAZORPAY_KEY_ID:  ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
        # Public site URL — baked into og:url, canonical, JSON-LD,
        # Twitter cards. Mobile share sheets read these meta tags, so
        # this MUST be the real production domain. If unset, the
        # hardcoded fallback in layout.tsx kicks in (cpmaiexamprep.com),
        # but plumbing the env var lets staging deploys override.
        NEXT_PUBLIC_SITE_URL:         ${NEXT_PUBLIC_SITE_URL:-https://cpmaiexamprep.com}
        NEXTAUTH_URL:                 ${NEXTAUTH_URL}
        NEXTAUTH_SECRET:              ${NEXTAUTH_SECRET}
    restart: always
    # Loopback only — Caddy fronts the public TLS endpoint.
    # FRONTEND_HOST_PORT (.deploy.conf) overrides the default 3000.
    ports: ["127.0.0.1:${FRONTEND_HOST_PORT:-3000}:3000"]
    volumes: []                      # image is canonical, no source mount
    command: npm run start
    depends_on:
      backend: { condition: service_started }
