services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cpmai
      POSTGRES_PASSWORD: cpmai_dev
      POSTGRES_DB: cpmai_prep
    ports: ["5433:5432"]   # host 5433 → container 5432 (avoids clash with native Postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpmai -d cpmai_prep"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf"]
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    ports: ["8000:8000"]
    volumes: ["./backend:/app"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    depends_on: [backend]
    ports: ["3000:3000"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
