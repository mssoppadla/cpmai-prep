# Shared base for dev and prod.
#
# Dev: `docker compose up`
#   → loads this file + docker-compose.override.yml (auto-loaded by compose).
#     The override adds source bind-mounts, dev ports, and `--reload`/`npm run dev`.
#
# Prod: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up`
#   → explicit -f bypasses the auto-loaded override file.
#     The prod overlay adds restart policy, loopback-only ports, prod build args,
#     and persists logs via a bind mount.
#
# This file is intentionally prod-shaped (no source mounts, no host ports, no
# --reload) so that a `-f` prod invocation gets a clean baseline.
services:
  postgres:
    # pgvector/pgvector:pg16 is a drop-in for postgres:16-alpine — same
    # PG16 binary, same data format, just bundles the `vector` extension.
    # The `pgdata` named volume is unchanged by this swap; existing rows
    # come back online untouched. The `vector` extension itself is
    # created by migration 0009 (CREATE EXTENSION IF NOT EXISTS vector).
    # If the swap ever has to be rolled back, switch this line back and
    # the rag_chunks table simply becomes inert (no extension available
    # to query it); the rest of the app keeps working.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cpmai
      POSTGRES_PASSWORD: cpmai_dev
      POSTGRES_DB: cpmai_prep
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpmai -d cpmai_prep"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes: ["./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf"]
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    # Admin file uploads (images / videos / attached PDFs from the CMS
    # and LMS lesson editors) land in /app/uploads inside the container.
    # Without this named volume the directory would be wiped on every
    # `docker compose up` rebuild and every prod deploy — see
    # backend/app/api/v1/endpoints/admin/uploads.py and the StaticFiles
    # mount in backend/app/main.py. Backed up by scripts/vps/backup.sh.
    volumes:
      - cpmai-uploads:/app/uploads
    environment:
      UPLOAD_ROOT: /app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    depends_on: [backend]
    command: npm run start

volumes:
  pgdata:
  cpmai-uploads:
